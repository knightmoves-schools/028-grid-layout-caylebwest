<html>
<head>
    <title>Grid Layout</title>
    <style>
        .grid-container {
            display: grid;
            grid-template-areas:   
                "leftNav header header"
                "leftNav main main";   
            grid-template-columns: 2fr 2fr;   
            grid-template-rows: auto 1fr;     
            gap: 10px;
            height: 100vh;                    
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        .first-item {
            grid-area: header;
            background-color: lightblue;
            padding: 20px;
            text-align: center;
            font-size: 1.5rem;
        }

        .second-item {
            grid-area: leftNav;
            background-color: lightgreen;
            padding: 20px;
        }

        .third-item {
            grid-area: main;
            background-color: lightcoral;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="first-item">Header (first) - Full width across the top</div>
        <div class="second-item">Left Navigation (second) - Narrow column</div>
        <div class="third-item">Main Content (third) - Twice as wide as the left nav</div>
    </div>

</body>
</html>
