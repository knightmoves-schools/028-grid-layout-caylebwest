<html>
<head>
    <title>Grid</title>
    <style>
        .grid-container {
            display: grid;
            grid-template-areas:
                'header header'
                'leftNav main'
                'leftNav main';
            grid-template-columns: 1fr 2fr;
            gap: 10px;
        }
    </style>
</head>

<body>
    <div class="grid-container">
        <div class="first-item">first</div>
        <div class="second-item">second</div>
        <div class="third-item">third</div>
    </div>
</body>
</html>
